<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect — Explore</title>
    <meta name="description" content="Discover new connections, search users, and expand your social circle.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- ── HEADER ─────────────────────────────────────────────── -->
    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#ng)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="50%" stop-color="#a78bfa"/>
                            <stop offset="100%" stop-color="#f472b6"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Connect
            </a>

            <div class="nav-search">
                <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="nav-search-input" placeholder="Search people…" autocomplete="off">
            </div>

            <div class="nav-actions">
                <div style="position:relative;">
                    <button class="nav-icon-btn" id="notif-btn" title="Notifications">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="badge hidden" id="notif-badge">0</span>
                    </button>
                    <div class="notifications-panel" id="notif-panel">
                        <div class="notif-header">
                            <h3>Notifications</h3>
                            <button class="mark-read-btn" id="mark-read-btn">Mark all read</button>
                        </div>
                        <div class="notif-list" id="notif-list">
                            <div class="notif-empty">No notifications yet</div>
                        </div>
                    </div>
                </div>

                <a href="/explore.html" class="nav-icon-btn active" title="Explore">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                </a>

                <a href="#" id="my-profile-link" class="nav-avatar" title="My Profile"></a>
            </div>
        </div>
    </header>

    <!-- ── PAGE WRAPPER ───────────────────────────────────────── -->
    <div class="page-wrapper">

        <!-- Sidebar Left -->
        <aside class="sidebar-left">
            <nav class="sidebar-nav">
                <a href="/" id="nav-feed">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Home</span>
                </a>
                <a href="/explore.html" class="active" id="nav-explore">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                    <span>Explore</span>
                </a>
                <a href="#" id="sidebar-notif-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span>Notifications</span>
                    <span class="notif-dot hidden" id="sidebar-notif-dot">0</span>
                </a>
                <a href="#" id="sidebar-profile-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Profile</span>
                </a>

                <div class="sidebar-divider"></div>

                <button onclick="logout()" id="sidebar-logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Logout</span>
                </button>
            </nav>

            <div class="sidebar-user-card">
                <a href="#" id="sidebar-user-link" class="sidebar-user" style="text-decoration:none; color:inherit;">
                    <div class="avatar avatar-sm" id="sidebar-avatar"></div>
                    <div class="sidebar-user-info">
                        <div class="name" id="sidebar-name">Loading…</div>
                        <div class="handle" id="sidebar-handle"></div>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Main Feed (Explore Content) -->
        <main class="main-feed">
            <div class="explore-page">
                <div class="search-bar-big">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="explore-search-input" placeholder="Search people by username or handle..." autocomplete="off">
                </div>

                <div id="search-results-section" style="display:none; margin-bottom: 2rem;">
                    <div class="section-heading" id="search-heading">Search Results</div>
                    <div id="search-results-list"></div>
                </div>

                <div id="suggested-users-section">
                    <div class="section-heading">Suggested Connections</div>
                    <div id="suggested-users-list">
                        <div class="skeleton skeleton-line skeleton-w-full"></div>
                        <div class="skeleton skeleton-line skeleton-w-full"></div>
                        <div class="skeleton skeleton-line skeleton-w-full"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Sidebar Right -->
        <aside class="sidebar-right">
            <div class="sidebar-widget" id="trending-widget">
                <div class="widget-title">🔥 Trending Posts</div>
                <div id="trending-list">
                    <div class="skeleton skeleton-line skeleton-w-full"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
    <script src="/js/explore.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
