<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect — Profile</title>
    <meta name="description" content="View user profile on Connect.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- ── HEADER ─────────────────────────────────────────────── -->
    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#ng2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="ng2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="50%" stop-color="#a78bfa"/>
                            <stop offset="100%" stop-color="#f472b6"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Connect
            </a>

            <div class="nav-search">
                <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="nav-search-input" placeholder="Search people…" autocomplete="off">
            </div>

            <div class="nav-actions">
                <div style="position:relative;">
                    <button class="nav-icon-btn" id="notif-btn" title="Notifications">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="badge hidden" id="notif-badge">0</span>
                    </button>
                    <div class="notifications-panel" id="notif-panel">
                        <div class="notif-header">
                            <h3>Notifications</h3>
                            <button class="mark-read-btn" id="mark-read-btn">Mark all read</button>
                        </div>
                        <div class="notif-list" id="notif-list"></div>
                    </div>
                </div>
                <a href="/explore.html" class="nav-icon-btn" title="Explore">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                </a>
                <a href="#" id="my-profile-link" class="nav-avatar" title="My Profile"></a>
            </div>
        </div>
    </header>

    <!-- Profile Content -->
    <div style="padding-top: 65px;">
        <div class="profile-page-wrapper" id="profile-content" style="display:none;">

            <!-- Cover + Card -->
            <div class="profile-cover" id="profile-cover">
                <div class="profile-cover-gradient" id="profile-cover-gradient"></div>
            </div>

            <div class="profile-card">
                <div class="profile-card-top">
                    <div class="profile-avatar-wrap">
                        <div class="avatar avatar-xl" id="profile-avatar-initial"></div>
                    </div>
                    <div style="display:flex; gap:0.75rem; padding-top:0.5rem;">
                        <button id="follow-btn" class="btn btn-sm hidden">Follow</button>
                        <button id="edit-profile-btn" class="btn btn-sm btn-outline hidden">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            Edit Profile
                        </button>
                    </div>
                </div>

                <h1 class="profile-name" id="profile-name"></h1>
                <p class="profile-handle-text" id="profile-handle"></p>
                <p class="profile-bio-text" id="profile-bio"></p>

                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-value" id="profile-posts-count">0</div>
                        <div class="stat-label">Posts</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="profile-followers">0</div>
                        <div class="stat-label">Followers</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="profile-following">0</div>
                        <div class="stat-label">Following</div>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="profile-tabs" id="profile-tabs-bar">
                <button class="profile-tab active" data-tab="posts" id="tab-posts">Posts</button>
                <button class="profile-tab hidden" data-tab="bookmarks" id="tab-bookmarks">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg>
                    Saved
                </button>
            </div>

            <!-- Posts / Bookmarks Container -->
            <div id="posts-container"></div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Edit Profile</h2>
                <button class="modal-close" id="edit-modal-close">✕</button>
            </div>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <div class="input-wrap">
                        <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                        <input type="text" id="edit-name" class="form-control" placeholder="Your name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Bio</label>
                    <textarea id="edit-bio" class="form-control no-icon" rows="3" placeholder="Tell people about yourself…" style="padding-left:0.9rem; resize:none;"></textarea>
                </div>
                <button type="submit" class="btn" style="width:100%; margin-top:0.5rem;">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">✕</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Hidden SVG Icons -->
    <svg style="display:none">
        <symbol id="icon-heart" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </symbol>
        <symbol id="icon-comment" viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </symbol>
        <symbol id="icon-bookmark" viewBox="0 0 24 24">
            <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </symbol>
    </svg>

    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
