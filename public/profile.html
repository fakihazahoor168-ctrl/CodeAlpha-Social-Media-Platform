<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect - Profile</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" style="margin-right: 0.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="100%" stop-color="#c084fc"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Connect
            </a>
            <div class="nav-links">
                <a href="/">Feed</a>
                <a href="#" id="my-profile-link">Profile</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </header>

    <div class="container" id="profile-content" style="display:none;">
        <div class="profile-header">
            <div class="avatar profile-avatar avatar-large" id="profile-avatar-initial"></div>
            <h2 id="profile-name"></h2>
            <p style="color: var(--text-muted);" id="profile-handle"></p>
            <p style="margin-top: 1rem;" id="profile-bio"></p>
            
            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value" id="profile-posts-count">0</div>
                    <div class="stat-label">Posts</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="profile-followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="profile-following">0</div>
                    <div class="stat-label">Following</div>
                </div>
            </div>

            <button id="follow-btn" class="btn" style="width: auto; padding: 0.5rem 2rem; display: none;">Follow</button>
        </div>

        <div id="posts-container">
            <div style="text-align: center; color: var(--text-muted);">Loading posts...</div>
        </div>
    </div>

    <!-- Icons Setup -->
    <svg style="display:none">
        <symbol id="icon-heart" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </symbol>
        <symbol id="icon-comment" viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </symbol>
    </svg>

    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
